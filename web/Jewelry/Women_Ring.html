    <script>
        function formatPrice(price) {
            return Number(price).toLocaleString("en-US");
        }

        function createStars(rating) {
            let html = '';
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            for (let i = 0; i < full; i++) html += '<i class="bi bi-star-fill"></i>';
            if (half) html += '<i class="bi bi-star-half"></i>';
            for (let i = full + half; i < 5; i++) html += '<i class="bi bi-star"></i>';
            return html;
        }

        const shapeList = ['Cushion', 'Emerald', 'Marquise', 'Oval', 'Pear', 'Radiant', 'Round'];
        let selectedShape = '*';
        let selectedColor = 'filter-color-Yellow'; // เริ่มต้นด้วยสี Yellow
        let initIsotope;

        async function loadProductData() {
            try {
                const response = await fetch("../assets/json/Women_Ring.json");
                const data = await response.json();
                const productContainer = document.querySelector(".product-container");

                const newRings = []; // 👈 ใส่ชื่อแหวนใหม่ได้ที่นี่

                const sortedFolders = data.folders.sort((a, b) => {
                    const nameA = a.split("_").slice(0, -2).join(" ");
                    const nameB = b.split("_").slice(0, -2).join(" ");
                    const isNewA = newRings.includes(nameA) ? -1 : 1;
                    const isNewB = newRings.includes(nameB) ? -1 : 1;
                    return isNewA - isNewB;
                });

                sortedFolders.forEach(folder => {
                    const parts = folder.split("_");
                    const productName = parts.slice(0, -2).join(" ");
                    const productPrice = parts[parts.length - 2];
                    const formattedPrice = formatPrice(productPrice);
                    const isNew = newRings.includes(productName);

                    const shape = shapeList.find(shape => productName.includes(shape));
                    const shapeClass = shape ? `filter-shape-${shape}` : '';

                    const productItem = document.createElement("div");
                    productItem.className = `col-md-6 col-lg-3 product-item isotope-item ${shapeClass}`;

                    // ✅ สร้าง HTML โดยโหลดรูปภาพทุกสี (Yellow, White, Rose)
                    productItem.innerHTML = `
                    <div class="product-card">
                        <div class="product-image" data-name="${productName}" data-folder="${folder}">
                         ${isNew ? `<span class="badge">New</span>` : ""}
                            <img src="../assets/img/product/Jewelry/Women_s Rings/${folder}/Top_Yellow.webp" alt="Yellow" class="img-fluid main-img img-Yellow">
                            <img src="../assets/img/product/Jewelry/Women_s Rings/${folder}/Top_White.webp" alt="White" class="img-fluid main-img img-White d-none">
                            <img src="../assets/img/product/Jewelry/Women_s Rings/${folder}/Top_Rose.webp" alt="Rose" class="img-fluid main-img img-Rose d-none">

                            <img src="../assets/img/product/Jewelry/Women_s Rings/${folder}/Front_Yellow.webp" alt="Yellow Hover" class="img-fluid hover-img hover-Yellow">
                            <img src="../assets/img/product/Jewelry/Women_s Rings/${folder}/Front_White.webp" alt="White Hover" class="img-fluid hover-img hover-White d-none">
                            <img src="../assets/img/product/Jewelry/Women_s Rings/${folder}/Front_Rose.webp" alt="Rose Hover" class="img-fluid hover-img hover-Rose d-none">
                        </div>
                        <div class="product-info">
                            <h5 class="product-title">
                                <a href="#" class="go-detail" data-name="${productName}" data-folder="${folder}">${productName}</a>
                            </h5>
                            <div class="product-price">
                                <span class="tm-text-gray-light">From ${formattedPrice} B</span>
                            </div>
                        </div>
                    </div>
                    `;

                    // ✅ เพิ่ม class สีไว้สำหรับ Isotope filter
                    ['Yellow', 'White', 'Rose'].forEach(color => {
                        productItem.classList.add(`filter-color-${color}`);
                    });

                    productContainer.appendChild(productItem);

                    // Event: เมื่อคลิกแหวนเพื่อดูรายละเอียด
                    productItem.querySelectorAll('.go-detail, .product-image').forEach(el => {
                        el.addEventListener('click', () => {
                            const folder = el.getAttribute('data-folder');
                            const name = el.getAttribute('data-name');
                            const colorText = selectedColor.replace('filter-color-', '');

                            // เก็บไว้ใน localStorage พร้อมข้อมูลราคา
                            localStorage.setItem('selectedProduct', JSON.stringify({
                                name,
                                folder,
                                color: colorText,
                                price: productPrice,  // ✅ เพิ่มราคา
                                fullData: folder      // ✅ เพิ่มข้อมูลเต็มสำหรับ backup
                            }));

                            // ไปหน้ารายละเอียด
                            window.location.href = "../Setting_Custom.html";
                        });
                    });

                });
            } catch (err) {
                console.error("Error loading product data:", err);
            }
        }

        function addFilterEvents() {
            // Shape filter buttons
            document.querySelectorAll('#shape_filter .filter-button').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelector('#shape_filter .filter-button.filter-active')?.classList.remove('filter-active');
                    this.classList.add('filter-active');
                    selectedShape = this.getAttribute('data-filter').replace('.', '');
                    applyCombinedFilter();

                    // ✅ แสดงชื่อ Shape
                    const shapeName = selectedShape.replace('filter-shape-', '');
                    document.getElementById('shape_setting').textContent = shapeName;
                });
            });

            // Color filter buttons
            document.querySelectorAll('#color_filter .circle').forEach(circle => {
                circle.addEventListener('click', function () {
                    document.querySelector('#color_filter .circle.selected')?.classList.remove('selected');
                    this.classList.add('selected');
                    const color = this.getAttribute('data-color');
                    selectedColor = `filter-color-${color}`;
                    applyCombinedFilter();

                    // ✅ แสดงชื่อ Color
                    document.getElementById('color_setting').textContent = `${color} Gold`;

                    // ✅ เปลี่ยนรูปภาพตามสีที่เลือก
                    document.querySelectorAll('.product-item').forEach(item => {
                        item.querySelectorAll('.main-img, .hover-img').forEach(img => img.classList.add('d-none'));
                        item.querySelectorAll(`.img-${color}, .hover-${color}`).forEach(img => img.classList.remove('d-none'));
                    });
                });
            });
        }

        function applyCombinedFilter() {
            let filter = '*';

            if (selectedShape !== '*' && selectedColor !== '*') {
                filter = `.${selectedShape}.${selectedColor}`;
            } else if (selectedShape !== '*') {
                filter = `.${selectedShape}`;
            } else if (selectedColor !== '*') {
                filter = `.${selectedColor}`;
            }

            if (initIsotope) {
                initIsotope.arrange({ filter });
            }
        }

        window.onload = async function () {
            await loadProductData();

            const container = document.querySelector(".product-container");

            imagesLoaded(container, function () {
                initIsotope = new Isotope(container, {
                    itemSelector: ".product-item",
                    layoutMode: "fitRows",
                    filter: '*'
                });

                initIsotope.layout();
                addFilterEvents();

                // ✅ ตั้งค่าเริ่มต้นและเลือก Yellow เป็นสีเริ่มต้น
                document.getElementById('shape_setting').textContent = 'All Shapes';
                document.getElementById('color_setting').textContent = 'Yellow Gold';

                // ✅ เลือก Yellow circle เป็นค่าเริ่มต้น
                const yellowCircle = document.querySelector('#color_filter .circle[data-color="Yellow"]');
                if (yellowCircle) {
                    yellowCircle.classList.add('selected');
                }

                // ✅ แสดงรูป Yellow เป็นค่าเริ่มต้นทันที
                document.querySelectorAll('.product-item').forEach(item => {
                    item.querySelectorAll('.main-img, .hover-img').forEach(img => img.classList.add('d-none'));
                    item.querySelectorAll('.img-Yellow, .hover-Yellow').forEach(img => img.classList.remove('d-none'));
                });
            });
        };
    </script>
